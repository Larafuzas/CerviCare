<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CerviCare</title>
    
    <meta name="theme-color" content="#111827">
    <link rel="icon" href="icono.jpg" type="image/jpeg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: '#1e293b',
                        neonCyan: '#2dd4bf',
                        neonBlue: '#3b82f6',
                        neonPurple: '#8b5cf6'
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; user-select: none; }
        .swiper-pagination-bullet-active { background-color: #2dd4bf !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        /* Clases para el Heatmap */
        .heat-0 { background-color: #1f2937; } /* Gris oscuro */
        .heat-1 { background-color: #134e4a; } /* Turquesa oscuro (Algunos) */
        .heat-2 { background-color: #0f766e; } /* Turquesa medio (Calor + Algunos) */
        .heat-3 { background-color: #1d4ed8; } /* Azul oscuro (Todos) */
        .heat-4 { background-color: #3b82f6; } /* Azul claro (Calor + Todos) */
        .heat-electro { outline: 2px solid #8b5cf6; outline-offset: -2px; } /* Borde Morado */
    </style>
</head>
<body class="bg-darkBg text-white font-sans antialiased h-screen flex flex-col overflow-hidden">

    <header class="p-4 border-b border-gray-800 flex justify-center items-center shadow-md z-10 bg-darkBg">
        <h1 class="text-2xl font-bold text-neonCyan tracking-wider">CerviCare</h1>
    </header>

    <main id="app-container" class="flex-1 overflow-y-auto relative w-full">
        
        <section id="vista-rutina" class="h-full w-full">
            <div class="swiper mySwiper h-full w-full">
                <div class="swiper-wrapper" id="contenedor-ejercicios"></div>
                <div class="swiper-pagination mb-12"></div>
            </div>
        </section>

        <section id="vista-estadisticas" class="hidden h-full w-full p-4 overflow-y-auto pb-24">
            <h2 class="text-xl font-bold text-white mb-3">Tu Progreso</h2>
            
            <div class="bg-cardBg p-4 rounded-xl border border-gray-700 mb-4 shadow-lg">
                <h3 class="text-neonCyan font-semibold mb-2 text-sm uppercase tracking-wide">Constancia (Últimos 35 días)</h3>
                <div id="calendario-heatmap" class="grid grid-cols-7 gap-1 mb-2"></div>
                
                <div class="flex flex-wrap gap-2 justify-center text-[10px] text-gray-400 mt-3">
                    <div class="flex items-center gap-1"><div class="w-3 h-3 heat-1 rounded-sm"></div> Ejercicios</div>
                    <div class="flex items-center gap-1"><div class="w-3 h-3 heat-2 rounded-sm"></div> + Calor</div>
                    <div class="flex items-center gap-1"><div class="w-3 h-3 heat-3 rounded-sm"></div> Tabla Completa</div>
                    <div class="flex items-center gap-1"><div class="w-3 h-3 heat-4 rounded-sm"></div> + Calor</div>
                    <div class="flex items-center gap-1"><div class="w-3 h-3 bg-gray-700 heat-electro rounded-sm"></div> Electro</div>
                </div>
            </div>

            <div class="bg-cardBg p-3 rounded-xl border border-gray-700 mb-4 shadow-lg">
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <select id="filtro-agrupacion" onchange="renderizarGraficos()" class="bg-darkBg border border-gray-600 text-xs rounded p-2 text-white outline-none">
                        <option value="dias">Por Días</option>
                        <option value="semanas">Por Semanas</option>
                        <option value="meses">Por Meses</option>
                    </select>
                    <select id="filtro-tipo" onchange="renderizarGraficos()" class="bg-darkBg border border-gray-600 text-xs rounded p-2 text-white outline-none">
                        <option value="todos">Todos los Ejercicios</option>
                        <option value="Movilidad">Solo Movilidad</option>
                        <option value="Fortalecimiento">Solo Fortalecimiento</option>
                        <option value="Estiramientos">Solo Estiramientos</option>
                    </select>
                    <select id="filtro-periodo" onchange="toggleFechasPersonalizadas()" class="bg-darkBg border border-gray-600 text-xs rounded p-2 text-white outline-none col-span-2">
                        <option value="7">Últimos 7 días</option>
                        <option value="30" selected>Últimos 30 días</option>
                        <option value="todo">Desde el principio</option>
                        <option value="custom">Personalizado...</option>
                    </select>
                </div>
                <div id="rango-fechas" class="hidden grid-cols-2 gap-2 mt-2 pt-2 border-t border-gray-700">
                    <div>
                        <label class="text-[10px] text-gray-400">Inicio</label>
                        <input type="date" id="fecha-inicio" onchange="renderizarGraficos()" class="w-full bg-darkBg border border-gray-600 text-xs rounded p-1 text-white">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400">Fin</label>
                        <input type="date" id="fecha-fin" onchange="renderizarGraficos()" class="w-full bg-darkBg border border-gray-600 text-xs rounded p-1 text-white">
                    </div>
                </div>
            </div>

            <div class="bg-cardBg p-4 rounded-xl border border-gray-700 mb-4 shadow-lg">
                <h3 class="text-neonCyan font-semibold mb-2 text-sm uppercase tracking-wide">Tendencia de Volumen</h3>
                <div class="relative h-48 w-full"><canvas id="grafico-tendencia"></canvas></div>
            </div>

            <div class="bg-cardBg p-4 rounded-xl border border-gray-700 shadow-lg">
                <h3 class="text-neonCyan font-semibold mb-2 text-sm uppercase tracking-wide">Equilibrio del Entrenamiento</h3>
                <div class="relative h-48 w-full flex justify-center"><canvas id="grafico-equilibrio"></canvas></div>
            </div>
        </section>

        <section id="vista-ajustes" class="hidden h-full w-full p-4 overflow-y-auto pb-24">
            <h2 class="text-xl font-bold text-white mb-4">Ajustes y Datos</h2>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="exportarCSV()" class="bg-cardBg border border-neonCyan text-neonCyan py-2 rounded text-sm font-semibold">Exportar CSV</button>
                <button onclick="exportarBackup()" class="bg-cardBg border border-neonCyan text-neonCyan py-2 rounded text-sm font-semibold">Backup JSON</button>
                <button onclick="document.getElementById('import-file').click()" class="bg-cardBg border border-gray-500 text-gray-300 py-2 rounded text-sm font-semibold">Restaurar JSON</button>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importarBackup(event)">
                <button onclick="borrarTodosLosDatos()" class="bg-red-900 border border-red-500 text-red-200 py-2 rounded text-sm font-semibold">Borrar Todo</button>
            </div>
            <h3 class="text-neonCyan font-semibold mb-3 text-sm uppercase tracking-wide">Últimos Registros</h3>
            <div id="lista-registros" class="space-y-2 mb-8"></div>
        </section>

    </main>

    <nav class="bg-cardBg border-t border-gray-800 flex justify-around p-2 pb-safe z-10 fixed bottom-0 w-full h-16">
        <button id="nav-rutina" class="nav-btn text-neonCyan flex flex-col items-center justify-center w-1/3" onclick="cambiarPestana('rutina')">
            <span class="text-xl">📋</span><span class="text-xs font-bold mt-1">Rutina</span>
        </button>
        <button id="nav-estadisticas" class="nav-btn text-gray-500 hover:text-neonCyan flex flex-col items-center justify-center w-1/3 transition-colors" onclick="cambiarPestana('estadisticas')">
            <span class="text-xl">📈</span><span class="text-xs font-bold mt-1">Progreso</span>
        </button>
        <button id="nav-ajustes" class="nav-btn text-gray-500 hover:text-neonCyan flex flex-col items-center justify-center w-1/3 transition-colors" onclick="cambiarPestana('ajustes')">
            <span class="text-xl">⚙️</span><span class="text-xs font-bold mt-1">Ajustes</span>
        </button>
    </nav>

    <script>
        const db = new Dexie('CerviCareDB');
        db.version(1).stores({ registros: '++id, fecha, ejercicio, series, repeticiones, fase' });

        const RUTINA_TOTAL_EJERCICIOS = 9; // 5 mov + 2 fort + 2 estiramientos

        const rutinaCervical = [
            { id: "fase1_calor", fase: "Fase 1: Preparación", titulo: "Aplicación de Calor", imagen: null, tipo: "temporizador", instrucciones: "<p><strong>Fundamento:</strong> Vasodilatación para relajar.</p>" },
            { id: "mov_flexion", fase: "Fase 2: Movilidad", titulo: "Flexión y Extensión", imagen: "flexion.jpg", tipo: "contador", instrucciones: "<p><strong>Técnica:</strong> Barbilla al pecho y extensión atrás.</p>" },
            { id: "mov_inclinacion", fase: "Fase 2: Movilidad", titulo: "Inclinación Lateral", imagen: "inclinacion.jpg", tipo: "contador", instrucciones: "<p><strong>Técnica:</strong> Oreja al hombro.</p>" },
            { id: "mov_rotacion", fase: "Fase 2: Movilidad", titulo: "Rotación", imagen: "rotacion.jpg", tipo: "contador", instrucciones: "<p><strong>Técnica:</strong> Gira la cabeza lentamente.</p>" },
            { id: "mov_circulos", fase: "Fase 2: Movilidad", titulo: "Semicírculos", imagen: "circulos.jpg", tipo: "contador", instrucciones: "<p><strong>Técnica:</strong> Dibuja una 'U' pendular.</p>" },
            { id: "mov_elevacion", fase: "Fase 2: Movilidad", titulo: "Elevación de Hombros", imagen: "elevacion.jpg", tipo: "contador", instrucciones: "<p><strong>Técnica:</strong> Sube hombros y relaja de golpe.</p>" },
            { id: "fort_resistencia1", fase: "Fase 3: Fortalecimiento", titulo: "Resistencia Frontal/Nuca", imagen: "resistencia1.jpg", tipo: "contador", instrucciones: "<p><strong>Técnica:</strong> Empuje isométrico.</p>" },
            { id: "fort_resistencia2", fase: "Fase 3: Fortalecimiento", titulo: "Resistencia Lateral", imagen: "resistencia2.jpg", tipo: "contador", instrucciones: "<p><strong>Técnica:</strong> Empuje lateral isométrico.</p>" },
            { id: "est_traccion1", fase: "Fase 4: Estiramientos", titulo: "Tracción Abajo/Adelante", imagen: "traccion1.jpg", tipo: "contador", instrucciones: "<p><strong>Técnica:</strong> Peso muerto de brazos nuca.</p>" },
            { id: "est_traccion2", fase: "Fase 4: Estiramientos", titulo: "Tracción Lateral", imagen: "traccion2.jpg", tipo: "contador", instrucciones: "<p><strong>Técnica:</strong> Inclinación suave asistida.</p>" },
            { id: "fase5_electro", fase: "Fase 5: Recuperación", titulo: "Electroestimulación", imagen: null, tipo: "electro", instrucciones: `<p>Colocar electrodos en trapecios/esplenios.</p>` }
        ];

        let miSwiper, chartTendencia = null, chartEquilibrio = null;
        let timerInterval, tiempoRestante = 15 * 60, timerEstado = 'detenido';

        window.onload = () => { renderizarRutina(); cargarHistorial(); };

        function renderizarRutina() {
            const contenedor = document.getElementById('contenedor-ejercicios');
            rutinaCervical.forEach(ej => {
                let controlesHTML = '';
                
                if (ej.tipo === 'temporizador') {
                    controlesHTML = `
                        <div class="flex gap-2 w-full">
                            <button id="btn-timer-play" onclick="toggleTemporizador()" class="flex-1 bg-neonCyan text-darkBg font-bold py-3 rounded-lg shadow-md transition-colors">Iniciar Calor</button>
                            <button id="btn-timer-reset" onclick="resetTemporizador()" class="hidden px-4 bg-red-900 border border-red-500 text-red-200 font-bold py-3 rounded-lg shadow-md transition-colors">⏹️</button>
                        </div>`;
                } else if (ej.tipo === 'contador') {
                    controlesHTML = `
                        <div class="flex justify-between gap-3 mb-3">
                            <div class="flex items-center justify-between bg-darkBg px-3 py-2 rounded w-1/2 border border-gray-600">
                                <span class="text-xs text-gray-400">Series</span>
                                <button onclick="cambiarValor('series-${ej.id}', -1)" class="text-neonCyan text-xl px-2 font-bold">-</button>
                                <span id="series-${ej.id}" class="font-bold text-lg">1</span>
                                <button onclick="cambiarValor('series-${ej.id}', 1)" class="text-neonCyan text-xl px-2 font-bold">+</button>
                            </div>
                            <div class="flex items-center justify-between bg-darkBg px-3 py-2 rounded w-1/2 border border-gray-600">
                                <span class="text-xs text-gray-400">Reps</span>
                                <button onclick="cambiarValor('reps-${ej.id}', -1)" class="text-neonCyan text-xl px-2 font-bold">-</button>
                                <span id="reps-${ej.id}" class="font-bold text-lg">1</span>
                                <button onclick="cambiarValor('reps-${ej.id}', 1)" class="text-neonCyan text-xl px-2 font-bold">+</button>
                            </div>
                        </div>
                        <button onclick="guardarRegistro('${ej.id}', '${ej.titulo}', '${ej.fase}', this)" class="w-full bg-gray-700 text-white font-bold py-3 rounded-lg transition-colors">Guardar y Siguiente</button>`;
                } else if (ej.tipo === 'electro') {
                    controlesHTML = `
                        <div class="flex gap-2">
                            <button onclick="guardarElectro(true, this)" class="w-1/2 bg-neonCyan text-darkBg font-bold py-3 rounded-lg shadow-md transition-colors">Sí, Aplicada</button>
                            <button onclick="guardarElectro(false, this)" class="w-1/2 bg-gray-700 text-white font-bold py-3 rounded-lg transition-colors">Saltar</button>
                        </div>`;
                }

                const visualHTML = ej.imagen 
                    ? `<img src="${ej.imagen}" class="h-36 mx-auto object-contain p-1" onerror="this.src=''; this.alt='Imagen: ${ej.imagen}'">`
                    : (ej.tipo === 'temporizador' ? `<div class="flex items-center justify-center h-36"><span class="text-5xl font-bold text-neonCyan" id="display-${ej.id}">15:00</span></div>` : `<div class="flex items-center justify-center h-20"><span class="text-4xl">⚡</span></div>`);

                contenedor.innerHTML += `
                    <div class="swiper-slide flex flex-col items-center justify-center p-4 pt-2 pb-8">
                        <div class="bg-cardBg w-full max-w-sm h-[78vh] rounded-2xl shadow-lg p-5 flex flex-col border border-gray-700">
                            <p class="text-neonCyan font-bold text-center text-xs uppercase tracking-wide mb-2">${ej.fase}</p>
                            <h3 class="text-white font-bold text-lg text-center mb-4 leading-tight">${ej.titulo}</h3>
                            <div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-3 pr-1">
                                <div class="w-full bg-gray-800 rounded-xl border border-gray-700 flex-shrink-0 flex items-center justify-center overflow-hidden">${visualHTML}</div>
                                <details class="group bg-darkBg border border-gray-700 rounded-lg p-3">
                                    <summary class="font-semibold text-gray-300 outline-none select-none cursor-pointer flex justify-between items-center text-sm">Instrucciones <span class="text-neonCyan font-bold text-xl group-open:rotate-180 transition-transform">▾</span></summary>
                                    <div class="mt-3 text-sm text-gray-300 space-y-2 border-t border-gray-700 pt-2 pb-1">${ej.instrucciones}</div>
                                </details>
                            </div>
                            <div class="h-auto flex flex-col justify-end mt-4">${controlesHTML}</div>
                        </div>
                    </div>`;
            });
            miSwiper = new Swiper(".mySwiper", { spaceBetween: 15, pagination: { el: ".swiper-pagination", dynamicBullets: true } });
        }

        // --- NAVEGACIÓN ---
        function cambiarPestana(id) {
            ['rutina', 'estadisticas', 'ajustes'].forEach(p => { document.getElementById(`vista-${p}`).classList.add('hidden'); document.getElementById(`nav-${p}`).classList.replace('text-neonCyan', 'text-gray-500'); });
            document.getElementById(`vista-${id}`).classList.remove('hidden'); document.getElementById(`nav-${id}`).classList.replace('text-gray-500', 'text-neonCyan');
            if (id === 'estadisticas') setTimeout(renderizarGraficos, 50);
            if (id === 'ajustes') cargarHistorial();
        }

        function cambiarValor(id, inc) { let el = document.getElementById(id), v = parseInt(el.innerText) + inc; el.innerText = v < 1 ? 1 : v; }

        // --- TEMPORIZADOR ---
        function toggleTemporizador() {
            const bp = document.getElementById('btn-timer-play'), br = document.getElementById('btn-timer-reset');
            if (timerEstado === 'detenido' || timerEstado === 'pausado') {
                timerEstado = 'corriendo'; bp.innerText = "Pausar"; bp.className = bp.className.replace('bg-neonCyan', 'bg-amber-500').replace('text-darkBg', 'text-white'); br.classList.remove('hidden');
                timerInterval = setInterval(() => {
                    tiempoRestante--; document.getElementById('display-fase1_calor').innerText = `${Math.floor(tiempoRestante/60).toString().padStart(2,'0')}:${(tiempoRestante%60).toString().padStart(2,'0')}`;
                    if (tiempoRestante <= 0) { clearInterval(timerInterval); timerEstado = 'completado'; document.getElementById('display-fase1_calor').innerText = "¡Listo!"; bp.innerText = "Siguiente Fase"; bp.className = bp.className.replace('bg-amber-500', 'bg-neonCyan').replace('text-white', 'text-darkBg'); bp.onclick = () => miSwiper.slideNext(); br.classList.add('hidden'); }
                }, 1000);
            } else if (timerEstado === 'corriendo') { clearInterval(timerInterval); timerEstado = 'pausado'; bp.innerText = "Reanudar"; bp.className = bp.className.replace('bg-amber-500', 'bg-neonCyan').replace('text-white', 'text-darkBg'); }
        }
        function resetTemporizador() { clearInterval(timerInterval); tiempoRestante = 15*60; timerEstado = 'detenido'; document.getElementById('display-fase1_calor').innerText = "15:00"; const bp = document.getElementById('btn-timer-play'); bp.innerText = "Iniciar Calor"; bp.className = bp.className.replace('bg-amber-500', 'bg-neonCyan').replace('text-white', 'text-darkBg'); bp.onclick = toggleTemporizador; document.getElementById('btn-timer-reset').classList.add('hidden'); }

        // --- REGISTRO ---
        async function guardarRegistro(id, titulo, fase, btn) {
            await db.registros.add({ fecha: new Date().toISOString().slice(0,10), ejercicio: titulo, series: parseInt(document.getElementById(`series-${id}`).innerText), repeticiones: parseInt(document.getElementById(`reps-${id}`).innerText), fase });
            const txt = btn.innerText; btn.innerText = "¡Guardado!"; btn.className = btn.className.replace('bg-gray-700', 'bg-green-500').replace('text-white', 'text-darkBg');
            setTimeout(() => { btn.innerText = txt; btn.className = btn.className.replace('bg-green-500', 'bg-gray-700').replace('text-darkBg', 'text-white'); miSwiper.slideNext(); }, 600);
        }
        async function guardarElectro(ap, btn) {
            if(ap) { await db.registros.add({ fecha: new Date().toISOString().slice(0,10), ejercicio: 'Electroestimulación', series: 1, repeticiones: 1, fase: 'Fase 5' }); btn.innerText = "¡Registrado!"; btn.classList.replace('bg-neonCyan', 'bg-green-500'); }
            setTimeout(() => { miSwiper.slideTo(0); btn.innerText = "Sí, Aplicada"; btn.classList.replace('bg-green-500', 'bg-neonCyan'); }, 800); 
        }

        // --- LÓGICA DE FECHAS Y GRÁFICOS AVANZADOS ---
        function toggleFechasPersonalizadas() {
            const per = document.getElementById('filtro-periodo').value;
            const divFechas = document.getElementById('rango-fechas');
            if (per === 'custom') { divFechas.classList.remove('hidden'); divFechas.classList.add('grid'); } 
            else { divFechas.classList.add('hidden'); divFechas.classList.remove('grid'); renderizarGraficos(); }
        }

        function obtenerSemana(fechaStr) {
            const d = new Date(fechaStr);
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
            return `${d.getUTCFullYear()}-W${weekNo.toString().padStart(2, '0')}`;
        }

        async function renderizarGraficos() {
            const todos = await db.registros.toArray();
            
            // 1. Dibujar Heatmap Global (últimos 35 días)
            dibujarHeatmap(todos);

            // 2. Aplicar Filtros Temporales para Gráficas
            const fPeriodo = document.getElementById('filtro-periodo').value;
            let fechaInicio = null, fechaFin = null;
            const hoy = new Date();
            
            if (fPeriodo === '7') { fechaInicio = new Date(hoy); fechaInicio.setDate(hoy.getDate() - 7); } 
            else if (fPeriodo === '30') { fechaInicio = new Date(hoy); fechaInicio.setDate(hoy.getDate() - 30); }
            else if (fPeriodo === 'custom') {
                fechaInicio = new Date(document.getElementById('fecha-inicio').value || '2000-01-01');
                fechaFin = new Date(document.getElementById('fecha-fin').value || '2100-01-01');
            }

            const datosFiltradosTemp = todos.filter(r => {
                const fr = new Date(r.fecha);
                if (fechaInicio && fr < fechaInicio) return false;
                if (fechaFin && fr > fechaFin) return false;
                return true;
            });

            // 3. Aplicar Filtro de Tipo y Agrupar
            const fTipo = document.getElementById('filtro-tipo').value;
            const fAgrupacion = document.getElementById('filtro-agrupacion').value;
            
            const datosTendencia = {};
            const datosEquilibrio = { 'Movilidad': 0, 'Fortalecimiento': 0, 'Estiramientos': 0 };

            datosFiltradosTemp.forEach(reg => {
                const esCalor = reg.fase.includes('Fase 1');
                const esElectro = reg.fase.includes('Fase 5');
                
                // Acumular para Equilibrio (solo si no es calor/electro)
                if (!esCalor && !esElectro) {
                    if (reg.fase.includes('Movilidad')) datosEquilibrio['Movilidad'] += reg.repeticiones;
                    if (reg.fase.includes('Fortalecimiento')) datosEquilibrio['Fortalecimiento'] += reg.repeticiones;
                    if (reg.fase.includes('Estiramientos')) datosEquilibrio['Estiramientos'] += reg.repeticiones;
                }

                // Filtrar para el gráfico de Tendencia
                if (fTipo !== 'todos' && !reg.fase.includes(fTipo)) return;
                
                // El Calor y Electro no suman "repeticiones de volumen" a la gráfica general si estamos viendo "Todos"
                if (fTipo === 'todos' && (esCalor || esElectro)) return; 

                // Agrupación
                let claveStr = reg.fecha;
                if (fAgrupacion === 'semanas') claveStr = obtenerSemana(reg.fecha);
                if (fAgrupacion === 'meses') claveStr = reg.fecha.substring(0, 7);

                if (!datosTendencia[claveStr]) datosTendencia[claveStr] = 0;
                datosTendencia[claveStr] += reg.repeticiones; // Calor/Electro suman 1 si se filtraron específicamente
            });

            // Renderizar Chart Tendencia
            if (chartTendencia) chartTendencia.destroy();
            const fechas = Object.keys(datosTendencia).sort();
            chartTendencia = new Chart(document.getElementById('grafico-tendencia').getContext('2d'), {
                type: 'line', 
                data: { labels: fechas, datasets: [{ label: 'Repeticiones', data: fechas.map(f => datosTendencia[f]), borderColor: '#2dd4bf', backgroundColor: 'rgba(45, 212, 191, 0.2)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#334155' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
            });

            // Renderizar Chart Equilibrio
            if (chartEquilibrio) chartEquilibrio.destroy();
            chartEquilibrio = new Chart(document.getElementById('grafico-equilibrio').getContext('2d'), {
                type: 'doughnut',
                data: { labels: ['Movilidad', 'Fortalecimiento', 'Estiramientos'], datasets: [{ data: [datosEquilibrio.Movilidad, datosEquilibrio.Fortalecimiento, datosEquilibrio.Estiramientos], backgroundColor: ['#2dd4bf', '#3b82f6', '#8b5cf6'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'right', labels: { color: '#cbd5e1' } } } }
            });
        }

        function dibujarHeatmap(todosRegistros) {
            const container = document.getElementById('calendario-heatmap');
            container.innerHTML = '';
            
            // Agrupar por fecha
            const evaluacionPorDia = {};
            todosRegistros.forEach(r => {
                if (!evaluacionPorDia[r.fecha]) evaluacionPorDia[r.fecha] = { ejercicios: new Set(), calor: false, electro: false };
                if (r.fase.includes('Fase 1')) evaluacionPorDia[r.fecha].calor = true;
                else if (r.fase.includes('Fase 5')) evaluacionPorDia[r.fecha].electro = true;
                else evaluacionPorDia[r.fecha].ejercicios.add(r.ejercicio);
            });

            // Generar los últimos 35 días
            const hoy = new Date();
            for (let i = 34; i >= 0; i--) {
                const d = new Date(hoy);
                d.setDate(hoy.getDate() - i);
                const fechaStr = d.toISOString().slice(0,10);
                
                const datosDia = evaluacionPorDia[fechaStr];
                let claseColor = 'heat-0';
                let clasesExtra = '';
                
                if (datosDia) {
                    const numEjercicios = datosDia.ejercicios.size;
                    const esCompleta = numEjercicios >= RUTINA_TOTAL_EJERCICIOS;
                    
                    if (esCompleta && datosDia.calor) claseColor = 'heat-4';
                    else if (esCompleta) claseColor = 'heat-3';
                    else if (numEjercicios > 0 && datosDia.calor) claseColor = 'heat-2';
                    else if (numEjercicios > 0) claseColor = 'heat-1';
                    // Solo calor sin ejercicios
                    else if (datosDia.calor) claseColor = 'heat-1'; 
                    
                    if (datosDia.electro) clasesExtra = 'heat-electro';
                }

                const title = datosDia ? `${fechaStr}: ${datosDia.ejercicios.size} Ejs, Calor:${datosDia.calor?'Sí':'No'}, Electro:${datosDia.electro?'Sí':'No'}` : fechaStr;
                container.innerHTML += `<div class="aspect-square rounded-sm ${claseColor} ${clasesExtra}" title="${title}"></div>`;
            }
        }

        // --- CRUD BÁSICO ---
        async function cargarHistorial() {
            const t = await db.registros.orderBy('id').reverse().limit(20).toArray();
            const l = document.getElementById('lista-registros'); l.innerHTML = '';
            if (t.length===0) return l.innerHTML = '<p class="text-gray-400 text-sm">No hay registros.</p>';
            t.forEach(r => l.innerHTML += `<div class="bg-darkBg p-3 rounded border border-gray-700 flex justify-between items-center"><div><p class="font-bold text-sm text-neonCyan">${r.ejercicio}</p><p class="text-xs text-gray-400">${r.fecha} | ${r.series} Ser / ${r.repeticiones} Reps</p></div><button onclick="borrarRegistro(${r.id})" class="text-red-500 px-2">🗑️</button></div>`);
        }
        async function borrarRegistro(id) { if(confirm("¿Borrar?")){ await db.registros.delete(id); cargarHistorial(); renderizarGraficos(); } }
        async function borrarTodosLosDatos() { if(confirm("⚠️ ¿Borrar TODOS?")){ await db.registros.clear(); alert("Borrados."); cargarHistorial(); renderizarGraficos(); } }
        async function exportarCSV() { const d = await db.registros.toArray(); let c="ID,Fecha,Fase,Ejercicio,Series,Reps\n"; d.forEach(r=>c+=`${r.id},${r.fecha},${r.fase},${r.ejercicio},${r.series},${r.repeticiones}\n`); descargarArchivo(c,`cervicare.csv`,'text/csv'); }
        async function exportarBackup() { descargarArchivo(JSON.stringify(await db.registros.toArray()),`cervicare.json`,'application/json'); }
        function importarBackup(e) { const r=new FileReader(); r.onload=async(ev)=>{ await db.registros.clear(); await db.registros.bulkAdd(JSON.parse(ev.target.result)); alert("Restaurado."); cargarHistorial(); }; r.readAsText(e.target.files[0]); }
        function descargarArchivo(c, n, t) { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([c],{type:t})); a.download=n; a.click(); }
    </script>
</body>
